#   type: NodePort

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-tracker-app
  namespace: praveen-ns

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: fitness-tracker-app

  template:
    metadata:
      labels:
        app: fitness-tracker-app
      annotations:
        ad.datadoghq.com/fitness-tracker-app.logs: >-
          [{"source":"nodejs","service":"fitness-tracker-service"},
           {"source":"nodejs","service":"fitness-tracker-app"}]

    spec:
      containers:
      - name: fitness-tracker-app
        image: aswinarc.azurecr.io/fitnessapp:latest
        # image: pulkit197/fitness_tracker-master-copy3-fitness-app:latest

        ports:
        - containerPort: 5000

        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"

        env:
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: fitness-secret
              key: MONGODB_URI

        - name: PORT
          valueFrom:
            secretKeyRef:
              name: fitness-secret
              key: PORT

        - name: HOST
          valueFrom:
            secretKeyRef:
              name: fitness-secret
              key: HOST

        - name: NODE_ENV
          valueFrom:
            secretKeyRef:
              name: fitness-secret
              key: NODE_ENV

        - name: DD_AGENT_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP

        - name: DD_TRACE_AGENT_PORT
          value: "8126"

        - name: DD_ENV
          value: "production"

        - name: DD_SERVICE
          value: "fitness-tracker-app"

        - name: DD_VERSION
          value: "1.0.0"

        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true

      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "fitness-kv"

---
apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-service
  namespace: praveen-ns

spec:
  selector:
    app: fitness-tracker-app

  ports:
  - port: 80
    targetPort: 5000

  type: NodePort
